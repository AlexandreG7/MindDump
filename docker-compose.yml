services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build: ./minddump-mcp
    ports:
      - "3001:3001"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=3001
      - MCP_SECRET=${MCP_SECRET}
      - MINDDUMP_API_URL=http://app:3000
      - MINDDUMP_API_KEY=${MINDDUMP_MCP_API_KEY}
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: minddump
      POSTGRES_USER: minddump
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minddump"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
