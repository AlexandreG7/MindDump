services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && rm -f /app/.env && npm install && npx prisma generate && npx prisma db push && npx prisma db seed && npx next dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgresql://minddump:devpass@db:5432/minddump?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-not-for-production
      - SKIP_AUTH=true
      - NEXT_PUBLIC_SKIP_AUTH=true
    depends_on:
      db:
        condition: service_healthy

  mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx tsx src/index.ts"
    ports:
      - "3001:3001"
    volumes:
      - ./minddump-mcp:/app
      - mcp_node_modules:/app/node_modules
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=3001
      - MCP_SECRET=dev-mcp-secret
      - MINDDUMP_API_URL=http://app:3000
      - MINDDUMP_API_KEY=
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: minddump
      POSTGRES_USER: minddump
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minddump"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  node_modules:
  mcp_node_modules:
